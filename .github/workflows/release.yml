name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools capnproto
          rustup target add x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      - name: Build release binaries
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/x86_64-unknown-linux-musl/release/commando-gateway
            target/x86_64-unknown-linux-musl/release/commando-agent

  gateway-image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: target/x86_64-unknown-linux-musl/release/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: |
            ghcr.io/icyrainz/commando-gateway:${{ steps.version.outputs.tag }}
            ghcr.io/icyrainz/commando-gateway:latest

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries/

      - name: Rename binaries
        run: |
          mv binaries/commando-gateway commando-gateway-x86_64-linux
          mv binaries/commando-agent commando-agent-x86_64-linux
          chmod +x commando-gateway-x86_64-linux commando-agent-x86_64-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            commando-gateway-x86_64-linux
            commando-agent-x86_64-linux
